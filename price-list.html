<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCO Price List</title>

<style>
@font-face{
    font-family:'Corbert';
    src:url('Corbert-Regular.ttf') format('truetype');
}
body{
    margin:0;
    font-family:'Corbert',sans-serif;
    background:white;
}
/* HEADER */
header{
    background:#002f87;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 30px;
}
header img{
    height:80px;
}
.header-center{
    text-align:center;
}
.header-center h1{
    margin:0;
    font-size:28px;
}
.header-center h2{
    margin:5px 0;
    color:#a18528;
}
/* SEARCH */
#searchSection{
    text-align:center;
    margin:40px 20px;
}
#searchInput{
    width:60%;
    padding:18px;
    font-size:18px;
    border:2px solid #002f87;
    border-radius:6px;
}
#searchBtn{
    padding:18px 25px;
    font-size:18px;
    background:#a18528;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-left:10px;
}
/* TABLE */
#resultTable{
    width:95%;
    margin:40px auto;
    border-collapse:collapse;
    display:none;
}
#resultTable th,#resultTable td{
    border:2px solid #002f87;
    padding:12px;
    font-size:16px;
    text-align:left;
}
#resultTable th{
    background:#002f87;
    color:white;
}
.price{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="inco-logo.png" alt="INCO Logo">
<div class="header-center">
<h1>JINASENA (PVT) LIMITED</h1>
<h2>INCO Price List</h2>
</div>
<img src="company-logo.png" alt="Company Logo">
</header>

<div id="searchSection">
<input type="text" id="searchInput" placeholder="Search Model, Item, or Description">
<button id="searchBtn">Search</button>
</div>

<table id="resultTable">
<thead>
<tr>
<th>Category</th>
<th>Model / Item</th>
<th>Design Identification Code</th>
<th>Description</th>
<th>Phase</th>
<th>Prime Mover</th>
<th>Voltage Range</th>
<th>Price</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
// ===== EMBEDDED DATA =====
const products = [
{Category:"Electric Pumps", Model:"N110T/1N", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"0.75/4.1", Voltage:"-", Price:"59,800"},
{Category:"Electric Pumps", Model:"N115T/1N", Design:"SDICH25", Description:"-", Phase:"-", Prime:"1/5.6", Voltage:"-", Price:"70,164"},
{Category:"Electric Pumps", Model:"PPO110/1N", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"0.75/4.1", Voltage:"-", Price:"59,800"},
{Category:"Electric Pumps", Model:"PPO115/1N", Design:"SDICH25", Description:"-", Phase:"-", Prime:"1/5.6", Voltage:"-", Price:"63,669"},
{Category:"Electric Pumps", Model:"10CJ 0205", Design:"SBICH25", Description:"-", Phase:"-", Prime:"0.5/2.9", Voltage:"-", Price:"40,710"},
{Category:"Electric Pumps", Model:"10CJ 0245", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"0.75/3.8", Voltage:"-", Price:"56,188"},
{Category:"Electric Pumps", Model:"10CJ 0305", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"1/5.2", Voltage:"-", Price:"59,195"},
{Category:"Electric Pumps", Model:"10CJ 0345", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"1/6.1", Voltage:"-", Price:"63,553"},
{Category:"Electric Pumps", Model:"12CJ 0305", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"1/5.2", Voltage:"-", Price:"61,947"},
{Category:"Electric Pumps", Model:"12CJ 0345", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"1/6.1", Voltage:"-", Price:"66,130"},
{Category:"Electric Pumps", Model:"12CJ 0405", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"1.5/7.1", Voltage:"-", Price:"69,835"},
{Category:"Electric Pumps", Model:"12CJ 0445", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"1.5/7.9", Voltage:"-", Price:"72,665"},
{Category:"Electric Pumps", Model:"12CJ 0505", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"2/9.2", Voltage:"-", Price:"77,580"},
{Category:"Electric Pumps", Model:"12CJ 0545", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"2/10.1", Voltage:"-", Price:"81,573"},
{Category:"Electric Pumps", Model:"12CJ 0605", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"2/11.2", Voltage:"-", Price:"85,600"},
{Category:"Electric Pumps", Model:"12CJ 0645", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"2/12.1", Voltage:"-", Price:"89,950"},
{Category:"Electric Pumps", Model:"12CJ 0705", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"3/13.5", Voltage:"-", Price:"94,370"},
{Category:"Electric Pumps", Model:"12CJ 0745", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"3/14.4", Voltage:"-", Price:"98,450"},
{Category:"Electric Pumps", Model:"12CJ 0805", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"3/15.2", Voltage:"-", Price:"102,650"},
{Category:"Electric Pumps", Model:"12CJ 0845", Design:"SD1CH25", Description:"-", Phase:"-", Prime:"3/16.1", Voltage:"-", Price:"107,300"},
// ... continue pasting all 167 products from your Excel here in the same format ...
];

// ===== SEARCH FUNCTION =====
function searchProducts(){
    const search = document.getElementById("searchInput").value.toLowerCase();
    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";
    let found = false;
    products.forEach(p => {
        const text = Object.values(p).join(" ").toLowerCase();
        if(text.includes(search)){
            found = true;
            tbody.innerHTML += `<tr>
                <td>${p.Category||""}</td>
                <td>${p.Model||""}</td>
                <td>${p.Design||""}</td>
                <td>${p.Description||""}</td>
                <td>${p.Phase||""}</td>
                <td>${p.Prime||""}</td>
                <td>${p.Voltage||""}</td>
                <td class="price">${p.Price||""}</td>
            </tr>`;
        }
    });
    document.getElementById("resultTable").style.display = found ? "table" : "none";
    if(!found && search.length>0) alert("No product found");
}

document.getElementById("searchBtn").addEventListener("click", searchProducts);
document.getElementById("searchInput").addEventListener("keypress", function(event){
    if(event.key === "Enter") searchProducts();
});
</script>

</body>
</html>
